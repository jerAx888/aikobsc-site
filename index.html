<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>AIKO</title>

<!-- Favicon: small icon shown in browser tab and address bar -->
<link rel="icon" type="image/png" href="aikoleft.png" />

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    scroll-behavior: smooth;
  }

  body {
    background: radial-gradient(circle at top, #2c240a, #000);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAVBAR */

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 60px;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-size: 32px;
    font-weight: bold;
    color: #ffd35a;
  }

  .nav-right {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .nav-right a {
    text-decoration: none;
    padding: 14px 30px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 16px;
    background: #ffd35a;
    color: black;
    transition: 0.3s;
  }

  .nav-right a:hover {
    background: #e6c84b;
  }

  /* HERO */

  .hero {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px;
    height: 80vh;
    position: relative;
    z-index: 2;
    gap: 40px;
  }

  /* LEFT SIDE */

  .left {
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .title {
    font-size: 130px;
    font-weight: 900;
    background: linear-gradient(90deg, #ffe99c, #ffbf00);
    -webkit-background-clip: text;
    color: transparent;
  }

  .desc {
    color: #ccc;
    font-size: 18px;
    line-height: 1.4;
  }

  .embrace {
    display: inline-block;
    padding: 14px 30px;
    background: #ffd35a;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 6px;
    transition: 0.3s;
  }

  .embrace:hover {
    background: #e6c84b;
  }

  /* CONTRACT ADDRESS */

  .contract {
    font-size: 12px;
    color: #ffd35a;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
  }

  .contract:hover {
    color: #fff;
    text-shadow: 0 0 8px #ffd35a;
  }

  #copied {
    margin-left: 6px;
    color: #00ff9d;
    font-size: 11px;
    display: none;
  }

  /* RIGHT SIDE */

  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .right img {
    width: 420px;
    filter: drop-shadow(0 0 40px rgba(255, 200, 0, 0.4));
  }

  /* STATUS */

  .status {
    background: #0f0f0f;
    padding: 12px 18px;
    border-radius: 10px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    font-size: 14px;
    text-align: center;
  }

  .status span {
    color: #ffd35a;
  }

  /* BACKGROUND TEXT */

  .bg-text {
    position: absolute;
    font-size: 420px;
    font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255, 215, 0, 0.15);
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    animation: moveText 8s linear infinite;
    z-index: 0;
  }

  @keyframes moveText {
    0% {
      transform: translate(-60%, -50%);
    }
    50% {
      transform: translate(-40%, -50%);
    }
    100% {
      transform: translate(-60%, -50%);
    }
  }

  /* DEX SECTION */

  .dex-section {
    padding: 40px 20px 80px 20px;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }

  .dex-section h2 {
    font-size: 28px;
    color: #ffd35a;
    text-shadow: 0 0 15px #ffd35a;
    margin-bottom: 10px;
  }

  .dex-section iframe {
    width: 1200px;
    height: 700px;
    border: none;
    border-radius: 10px;
  }

  /* MOBILE */

  @media (max-width: 900px) {
    .hero {
      flex-direction: column;
      text-align: center;
      height: auto;
    }

    .title {
      font-size: 70px;
    }

    .right img {
      width: 320px;
    }

    .dex-section iframe {
      width: 100%;
      height: 500px;
    }

    .left {
      max-width: 90%;
      align-items: center;
    }
  }
</style>
</head>

<body>

<div class="bg-text">AIKO</div>

<!-- NAVBAR -->

<nav>
  <div class="logo">AIKO</div>

  <div class="nav-right">
    <a href="#chart">CHART</a>
    <a href="https://flap.sh/bnb/board" target="_blank">BUY $AIKO</a>
    <a href="https://x.com/Aikobscdotxyz" target="_blank">X</a>
  </div>
</nav>

<!-- HERO -->

<section class="hero">
  <div class="left">
    <div class="title">AIKO</div>

    <p class="desc">
      Your intelligent AI companion powered by ElizaCloud.
      Experience deep, natural conversations with AIKO — always on, always smart.
    </p>

    <a
      href="https://www.elizacloud.ai/dashboard/chat?characterId=a71c8a6a-6312-4cb5-8851-b1647245b73b"
      target="_blank"
      class="embrace"
      >START CHATTING</a
    >

    <div class="contract" onclick="copyCA()">
      CA: <span id="ca">--------------------------</span>
      <span id="copied">Copied!</span>
    </div>
  </div>

  <div class="right">
    <img src="aiko.png" alt="AIKO Image" />

    <div class="status">
      Agent Status: <span>Online</span><br />
      Alpha Version 2.1<br />
      Built On ElizaOS
    </div>
  </div>
</section>

<!-- DEX -->

<section id="chart" class="dex-section">
  <h2>$AIKO REAL TIME PRICE</h2>

  <iframe
    src="-------------------------------------?embed=1&theme=dark"
    scrolling="no"
  ></iframe>
</section>

<script>
  function copyCA() {
    const ca = document.getElementById("ca").innerText;
    navigator.clipboard.writeText(ca);
    const copied = document.getElementById("copied");
    copied.style.display = "inline";
    setTimeout(function () {
      copied.style.display = "none";
    }, 1500);
  }
</script>

</body>
</html>
